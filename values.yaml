actualBudget:
  image:
    repository: harbor.ops.quest/library/actual-budget
    tag: latest
    pullPolicy: Always
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  nodeSelector:
    kubernetes.io/hostname: vmi3167286
  storage:
    storageClass: longhorn
    size: 5Gi
  # Enable Banking OAuth2 callback URL — must match what is registered in the
  # Enable Banking developer portal. importer.ops.quest now routes here.
  enableBankingRedirectUrl: "https://importer.ops.quest/eb-callback"
  emailNotifier:
    enabled: true
    budgetId: "0cbe36d6-495b-43d2-a66e-4a0f21803f0b"          # Actual Budget sync ID (from Settings → Show advanced settings)
    notifyEmail: "yoann.eusebi@hotmail.fr"       # Recipient e-mail address
    fromEmail: "server@ops.quest"         # Sender address, e.g. "Budget <budget@ops.quest>"
    dailyCron: "0 8 * * *"   # Every day at 08:00
    weeklyCron: "0 9 * * 0"  # Every Sunday at 09:00
    timezone: "Europe/Paris"
    smtp:
      host: "smtp.mail.ovh.net"
      port: "465"
      secure: "true"  # Use TLS
      user: "server@ops.quest"             # Leave empty for unauthenticated relay

ebImporter:
  image:
    repository: harbor.ops.quest/library/eb-importer
    tag: latest
    pullPolicy: Always
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  nodeSelector:
    kubernetes.io/hostname: vmi3167286
  config:
    # Internal cluster URL for Actual Budget
    actualUrl: "http://actual-budget.budget.svc.cluster.local:5006"
    # Public URL shown in the "Open Actual Budget" button after sync
    actualBudgetPublicUrl: "https://budget.ops.quest"
    # Actual Budget account UUID to import transactions into
    # Override in values.secret.yaml
    actualAccountId: ""
    ebConfigPath: "/app/eb/config.json"
    ebPemPath: "/app/eb/private.pem"
    # Enable Banking API
    apiOrigin: "https://api.enablebanking.com"
    aspspName: "CIC"
    aspspCountry: "FR"
    daysBack: 365

ingress:
  actualBudget:
    host: budget.ops.quest
    certIssuer: letsencrypt-prod
    ingressClass: public
  ebImporter:
    host: importer.ops.quest
    certIssuer: letsencrypt-prod
    ingressClass: public

# -----------------------------------------------------------------------
# Secrets — pass via deploy.sh (--set / --set-file), never store here.
# -----------------------------------------------------------------------
secrets:
  actualPassword: ""
  ebApplicationId: ""
  ebRedirectUrl: "https://importer.ops.quest/auth_redirect"
  ebPrivateKey: ""
  smtpPassword: ""   # Only needed if emailNotifier.smtp.user is set
