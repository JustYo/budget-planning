apiVersion: apps/v1
kind: Deployment
metadata:
  name: actual-budget
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "terra-budget.labels" . | nindent 4 }}
    app: actual-budget
spec:
  replicas: {{ .Values.actualBudget.replicas }}
  selector:
    matchLabels:
      app: actual-budget
  template:
    metadata:
      labels:
        app: actual-budget
    spec:
      nodeSelector:
        {{- toYaml .Values.actualBudget.nodeSelector | nindent 8 }}
      containers:
        - name: actual-budget
          image: "{{ .Values.actualBudget.image.repository }}:{{ .Values.actualBudget.image.tag }}"
          imagePullPolicy: {{ .Values.actualBudget.image.pullPolicy }}
          ports:
            - containerPort: 5006
          env:
            - name: ENABLEBANKING_REDIRECT_URL
              value: {{ .Values.actualBudget.enableBankingRedirectUrl | quote }}
            {{- if .Values.actualBudget.emailNotifier.enabled }}
            - name: ACTUAL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eb-importer
                  key: actual-password
            - name: ACTUAL_BUDGET_ID
              value: {{ .Values.actualBudget.emailNotifier.budgetId | quote }}
            - name: NOTIFY_EMAIL
              value: {{ .Values.actualBudget.emailNotifier.notifyEmail | quote }}
            - name: FROM_EMAIL
              value: {{ .Values.actualBudget.emailNotifier.fromEmail | quote }}
            - name: SMTP_HOST
              value: {{ .Values.actualBudget.emailNotifier.smtp.host | quote }}
            - name: SMTP_PORT
              value: {{ .Values.actualBudget.emailNotifier.smtp.port | quote }}
            - name: SMTP_SECURE
              value: {{ .Values.actualBudget.emailNotifier.smtp.secure | quote }}
            {{- if .Values.actualBudget.emailNotifier.smtp.user }}
            - name: SMTP_USER
              value: {{ .Values.actualBudget.emailNotifier.smtp.user | quote }}
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: eb-importer
                  key: smtp-password
            {{- end }}
            {{- if .Values.actualBudget.emailNotifier.dailyCron }}
            - name: DAILY_CRON
              value: {{ .Values.actualBudget.emailNotifier.dailyCron | quote }}
            {{- end }}
            {{- if .Values.actualBudget.emailNotifier.weeklyCron }}
            - name: WEEKLY_CRON
              value: {{ .Values.actualBudget.emailNotifier.weeklyCron | quote }}
            {{- end }}
            {{- if .Values.actualBudget.emailNotifier.timezone }}
            - name: TZ
              value: {{ .Values.actualBudget.emailNotifier.timezone | quote }}
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: actual-data
              mountPath: /data
          resources:
            {{- toYaml .Values.actualBudget.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["node", "build/src/scripts/health-check.js"]
            initialDelaySeconds: 20
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["node", "build/src/scripts/health-check.js"]
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: actual-data
          persistentVolumeClaim:
            claimName: actual-budget-data
