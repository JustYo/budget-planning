include:
  - project: secure-templates/trivy
    file: /trivy.gitlab-ci.yml
  - project: secure-templates/gitleaks
    file: /gitleaks.gitlab-ci.yml

stages:
  - container_scanning
  - code_scanning
  - gitleaks_scan
  - helm_scan
  - js_install
  - js_check

# ── JavaScript / TypeScript checks ─────────────────────────────────────────

.js_base:
  image: node:22-alpine
  before_script:
    - corepack enable
    - corepack prepare yarn@4.10.3 --activate
  only:
    - merge_requests
    - main

js_install:
  extends: .js_base
  stage: js_install
  script:
    - cd actual
    - yarn install --immutable
  cache:
    key:
      files:
        - actual/yarn.lock
    paths:
      - actual/.yarn/cache
  artifacts:
    paths:
      - actual/node_modules/
      - actual/packages/*/node_modules/
    expire_in: 1 hour

js_lint:
  extends: .js_base
  stage: js_check
  needs: [js_install]
  script:
    - cd actual
    - yarn lint

js_typecheck:
  extends: .js_base
  stage: js_check
  needs: [js_install]
  script:
    - cd actual
    - yarn workspace @actual-app/web run typecheck
    - yarn workspace @actual-app/sync-server run typecheck

js_test:
  extends: .js_base
  stage: js_check
  needs: [js_install]
  script:
    - cd actual
    - yarn test
  artifacts:
    when: on_failure
    paths:
      - actual/packages/*/coverage/
    expire_in: 7 days

# ── Helm ────────────────────────────────────────────────────────────────────

helm_lint:
  stage: helm_scan
  image: harbor.ops.quest/docker-hub-proxy/alpine/helm:3.12.0
  script:
    - helm lint . -f values.yaml --set "secrets.actualPassword=dummy" --set "secrets.ebApplicationId=dummy" --set "secrets.ebRedirectUrl=dummy" --set "ebImporter.config.actualAccountId=dummy" --set-file "secrets.ebPrivateKey=text.txt" --set "secrets.smtpPassword=dummy"
  only:
    - merge_requests
    - main